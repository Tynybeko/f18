<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        dialog {
            padding: auto;
            margin: auto;
        }

        .items {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            gap: 20px;
        }

        .items .item {
            border: 1px solid black;
            border-radius: 20px;
            flex: 1 0 200px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .items .item .item-content {
            width: 100%;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .items .item .item-content.wrap {
            width: 100%;
            overflow: auto;
            display: block;
            -webkit-line-clamp: auto;
        }

        #item_dialog {
            border: none;
            background-color: transparent;
        }

        .item_dialog_content {
            border: 1px solid red;
            background-color: white;
            padding: 20px;
            border-radius: 20px;

        }
    </style>
</head>

<body>
    <button class="open_dialog">OPEN DIALOG</button>
    <dialog id="item_dialog">
        <div class="item_dialog_content">
            <h3>Add Item</h3>
            <form>
                <label for="title">
                    <p>Title</p>
                    <input required type="text" name="title" id="title">
                </label>
                <label for="description">
                    <p>Description</p>
                    <textarea required type="text" name="desc" id="description"></textarea>
                </label>
                <label for="price">
                    <p>Price</p>
                    <input required type="number" name="price" id="price">
                </label>
                <div>
                    <button>ADD</button>
                    <button class="cancel" type="button">CANCEL</button>
                </div>
            </form>
        </div>
    </dialog>
    <main>
        <div class="items">

        </div>
    </main>
    <template id="product-template">
        <div class="item">
            <h3 class="item-title">Название товара</h3>
            <p class="item-content">Lorem ipsum dolor sit amet consectetur adipisicing elit. Eos, commodi quas. Quam
                odio, consequuntur
                praesentium dolorem mollitia non, aut voluptas, dolore ducimus ab velit magni. Impedit, explicabo
                sit. Rerum, velit.</p>
            <p class="item-price">price: <strong>230</strong></p>
        </div>
    </template>
    <script src="./test.js"></script>
</body>

</html>
