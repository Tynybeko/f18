<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .right_bar {
            position: fixed;
            top: 0;
            left: 0;
            overflow-x: hidden;
            height: 100dvh;
            width: 100vw;
            transition: background 1s ease-in-out;
            background-color: rgba(0, 0, 0, 0.398);
            display: flex;
            justify-content: end;
        }

        .right_bar .content {
            max-width: 300px;
            width: 100%;
            height: 100%;
            display: flex;
            background-color: white;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn .5s 1 ease-in-out forwards;
        }


        .right_bar .content .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 0;
        }

        .right_bar .content .body {
            flex: 1;
            overflow-y: auto;
        }

        .right_bar.closed {
            display: none;
        }

      

        .right_bar.closed .content {
            transform: translateX(100%);
            transition: 4s transform ease-in-out;

        }

        .right_bar .content .header .close_btn {
            background-color: transparent;
            cursor: pointer;
            border: none;
        }

        .right_bar .content .header .close_btn:hover svg path {
            fill: red;
            transition: fill .2s ease-in-out;
        }

        .right_bar .content .header .close_btn svg {
            width: 20px;
            height: 20px;
        }

        @keyframes fadeIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

          .right_bar .content.close {
            animation: fadeIn 2s linear 1 reverse forwards;
        }

        .sneakers_item {
            border: 1px solid red;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;

            p {
                border: 1px solid black;
            }
        }
    </style>
</head>

<body>
    <button class="open_cart_btn">OPEN CART</button>
    <section id="right_bar" class="right_bar closed">
        <div class="content">
            <div class="header">
                <button class="close_btn">
